[tools]
node = "24"
pnpm = "10"

[env]
# cli.js is ~16MB; Babel AST + generator needs ~10GB during repack
NODE_OPTIONS = "--max-old-space-size=12288"

[tasks.patch]
description = "Safety guard: in-place detect-target patching is disabled; use native:update"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "In-place detect-target patching is disabled." >&2
echo "Use: mise run native:update" >&2
echo "Or:  mise run native:fetch-patch latest && mise run native:promote <build-path>" >&2
exit 1
"""

[tasks."patch:target"]
description = "Patch an explicit native claude binary path"
usage = '''
arg "<target>" help="Path to native claude binary"
flag "--dry-run" help="Preview without writing"
flag "-o --output <path>" help="Output path (default: <target>.patched)"
flag "--summary <file>" help="Write JSON summary to file"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
ARGS=(--target "${usage_target?}")
DEFAULT_OUTPUT="${usage_target?}.patched"
ARGS+=(--output "${usage_output:-$DEFAULT_OUTPUT}")
[[ "${usage_dry_run:-}" == "true" ]] && ARGS+=(--dry-run)
[[ -n "${usage_summary:-}" ]] && ARGS+=(--summary-path "${usage_summary}")
pnpm cli "${ARGS[@]}"
"""

[tasks."native:backup"]
description = "Create a backup for an explicit native target"
usage = '''
arg "<target>" help="Path to native claude binary"
arg "[backup_path]" help="Optional explicit backup file path"
'''
run = "pnpm cli --target ${usage_target?} --backup-only ${usage_backup_path:+--backup-path ${usage_backup_path}}"

[tasks."native:restore"]
description = "Restore an explicit native target from backup"
usage = '''
arg "<target>" help="Path to native claude binary"
arg "[backup_path]" help="Optional explicit backup file path"
'''
run = "pnpm cli --target ${usage_target?} --restore ${usage_backup_path:+--backup-path ${usage_backup_path}}"

[tasks."native:unpack"]
description = "Extract embedded JS from a native target"
usage = '''
arg "<target>" help="Path to native claude binary"
arg "<output_js>" help="Path to write extracted JS"
'''
run = "pnpm cli --target ${usage_target?} --unpack ${usage_output_js?}"

[tasks."native:repack"]
description = "Repack JS file back into a native target"
usage = '''
arg "<target>" help="Path to native claude binary"
arg "<input_js>" help="Path to JS to embed"
arg "[output]" help="Optional output binary path (default in-place)"
'''
run = "pnpm cli --target ${usage_target?} --repack ${usage_input_js?} ${usage_output:+--output ${usage_output}}"

[tasks."native:pull"]
description = "Fetch native binary and extract clean formatted JS (for diffing)"
usage = '''
arg "[spec]" help="latest|stable|X.Y.Z (default: latest)"
flag "--platform <platform>" help="Platform override (e.g. linux-x64)"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
SPEC="${usage_spec:-latest}"
FETCH_ARGS=(--native-fetch "$SPEC" --native-fetch-only)
[[ -n "${usage_platform:-}" ]] && FETCH_ARGS+=(--native-platform "${usage_platform}")
FETCH_OUTPUT=$(pnpm cli "${FETCH_ARGS[@]}" 2>&1)
echo "$FETCH_OUTPUT"

# Resolve version from fetch output (not cache listing)
CACHE_DIR="${HOME}/.claude-patcher/native-cache"
VERSION=$(echo "$FETCH_OUTPUT" | sed -nE '\\#native-cache/[0-9]+\\.[0-9]+\\.[0-9]+#{s#.*native-cache/([0-9]+\\.[0-9]+\\.[0-9]+).*#\\1#;p;q;}')
if [[ -z "$VERSION" ]]; then
  echo "Could not determine fetched version from output" >&2
  exit 1
fi
PLATFORM="${usage_platform:-linux-x64}"
BINARY="$CACHE_DIR/$VERSION/$PLATFORM/claude"

if [[ ! -f "$BINARY" ]]; then
  echo "Binary not found: $BINARY" >&2
  exit 1
fi

OUT_DIR="versions_clean/$VERSION"
mkdir -p "$OUT_DIR"
UNPACK_ARGS=(--target "$BINARY" --unpack "$OUT_DIR/cli.js")
pnpm cli "${UNPACK_ARGS[@]}"
echo "Clean JS: $OUT_DIR/cli.js"
"""

[tasks."native:fetch"]
description = "Fetch official native Claude binary into local cache"
usage = '''
arg "[spec]" help="latest|stable|X.Y.Z (default: latest)"
flag "--force" help="Force re-download even if cached"
flag "--platform <platform>" help="Platform override (e.g. linux-x64)"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
ARGS=(--native-fetch "${usage_spec:-latest}" --native-fetch-only)
[[ "${usage_force:-}" == "true" ]] && ARGS+=(--native-force-download)
[[ -n "${usage_platform:-}" ]] && ARGS+=(--native-platform "${usage_platform}")
pnpm cli "${ARGS[@]}"
"""

[tasks."native:fetch-patch"]
description = "Fetch native Claude binary and patch it (writes to builds/ subdir)"
usage = '''
arg "[spec]" help="latest|stable|X.Y.Z (default: latest)"
flag "--force" help="Force re-download even if cached"
flag "--dry-run" help="Preview without writing"
flag "--platform <platform>" help="Platform override (e.g. linux-x64)"
flag "--summary <file>" help="Write JSON summary to file"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
ARGS=(--native-fetch "${usage_spec:-latest}")
[[ "${usage_force:-}" == "true" ]] && ARGS+=(--native-force-download)
[[ "${usage_dry_run:-}" == "true" ]] && ARGS+=(--dry-run)
[[ -n "${usage_platform:-}" ]] && ARGS+=(--native-platform "${usage_platform}")
[[ -n "${usage_summary:-}" ]] && ARGS+=(--summary-path "${usage_summary}")
pnpm cli "${ARGS[@]}"
"""

[tasks."native:update"]
description = "Fetch, patch, and promote latest Claude binary (one command)"
usage = '''
arg "[spec]" help="latest|stable|X.Y.Z (default: latest)"
flag "--force" help="Force re-download even if cached"
flag "--platform <platform>" help="Platform override"
flag "--dry-run" help="Fetch + patch preview only (no promote)"
flag "--no-patch" help="Skip patching and promote fetched binary as-is"
flag "--diff" help="Show diff during patch step"
flag "--summary <file>" help="Write JSON summary to file"
flag "--skip-smoke-test" help="Skip post-promote version check"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
ARGS=(--update)
[[ "${usage_spec:-latest}" != "latest" ]] && ARGS+=(--native-fetch "${usage_spec}")
[[ "${usage_force:-}" == "true" ]] && ARGS+=(--native-force-download)
[[ -n "${usage_platform:-}" ]] && ARGS+=(--native-platform "${usage_platform}")
[[ "${usage_dry_run:-}" == "true" ]] && ARGS+=(--dry-run)
[[ "${usage_no_patch:-}" == "true" ]] && ARGS+=(--no-patch)
[[ "${usage_diff:-}" == "true" ]] && ARGS+=(--diff)
[[ -n "${usage_summary:-}" ]] && ARGS+=(--summary-path "${usage_summary}")
[[ "${usage_skip_smoke_test:-}" == "true" ]] && ARGS+=(--skip-smoke-test)
pnpm cli "${ARGS[@]}"
"""

[tasks."native:promote"]
description = "Promote a patched native binary to active launcher"
usage = 'arg "<target>" help="Path to patched native binary"'
run = "pnpm cli --promote ${usage_target?}"

[tasks."native:rollback"]
description = "Roll back to previous promoted binary"
usage = 'arg "[target]" help="Optional explicit rollback target"'
run = "pnpm cli --rollback ${usage_target:+--rollback-target ${usage_target}}"

[tasks.status]
description = "Show current/previous/cached version status"
run = "pnpm cli --status"

[tasks.list]
description = "List available patches"
run = "pnpm cli --list"

[tasks.inspect]
description = "AST search tool with breadcrumbs and context"
usage = '''
arg "<file>" help="Path to JS file to inspect"
arg "<query>" help="Search query string"
flag "-d" help="Definitions only"
flag "-e" help="Exact match"
flag "-C --context <n>" help="Context lines (default: 1)"
flag "-l --limit <n>" help="Max results (default: 10)"
flag "-t --type <type>" help="Filter by AST node type"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
ARGS=(search "${usage_file?}" "${usage_query?}")
[[ "${usage_d:-}" == "true" ]] && ARGS+=(-d)
[[ "${usage_e:-}" == "true" ]] && ARGS+=(-e)
[[ -n "${usage_context:-}" ]] && ARGS+=(-C "${usage_context}")
[[ -n "${usage_limit:-}" ]] && ARGS+=(-l "${usage_limit}")
[[ -n "${usage_type:-}" ]] && ARGS+=(-t "${usage_type}")
pnpm inspect "${ARGS[@]}"
"""

[tasks."inspect:view"]
description = "View lines from a JS file"
usage = '''
arg "<file>" help="Path to JS file"
arg "<range>" help="Line range (e.g. 1000:1050)"
'''
run = "pnpm inspect view ${usage_file?} ${usage_range?}"

[tasks.diff]
description = "Structural AST diff between two JS files"
usage = '''
arg "<original>" help="Path to original JS file"
arg "<patched>" help="Path to patched JS file"
'''
run = "pnpm diff ${usage_original?} ${usage_patched?}"

[tasks."lint:fix"]
description = "Auto-fix lint and format issues"
run = "pnpm biome check --write src/"

[tasks."verify:anchors"]
description = "Compare patched and clean cli.js anchors (signature + key patch markers)"
usage = '''
arg "<patched_cli>" help="Path to patched cli.js"
arg "<clean_cli>" help="Path to clean/unpatched cli.js"
'''
run = "pnpm verify:anchors ${usage_patched_cli?} ${usage_clean_cli?}"

[tasks."verify:prompt-surfaces"]
description = "Verify exported live prompt surfaces in tools/agents/system markdown"
usage = 'arg "<export_dir>" help="Path to exported-prompts/<label> directory"'
run = "pnpm verify:prompt-surfaces ${usage_export_dir?}"

[tasks."verify:cache"]
description = "Run live cache efficiency benchmark (baseline vs patched policy) when ANTHROPIC_API_KEY is set"
usage = '''
arg "[model]" help="Model ID (default: ANTHROPIC_MODEL env)"
arg "[transcript]" help="Transcript JSON fixture path (default: src/verification/fixtures/cache-transcript.json)"
flag "--output-json <file>" help="Write benchmark JSON report"
flag "--output-csv <file>" help="Write benchmark CSV report"
flag "--ttl <ttl>" help="Cache TTL: 5m|1h|none"
flag "--max-cost-regression-pct <pct>" help="Allowed patched cost regression percent"
flag "--min-cache-read-delta <tokens>" help="Required patched cache_read delta tokens"
flag "--dry-run" help="Render benchmark plan without calling the API"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail

if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
  echo "Skipping verify:cache (ANTHROPIC_API_KEY is not set)"
  exit 0
fi

ARGS=()
[[ -n "${usage_model:-}" ]] && ARGS+=(--model "${usage_model}")
[[ -n "${usage_transcript:-}" ]] && ARGS+=(--transcript "${usage_transcript}")
[[ -n "${usage_output_json:-}" ]] && ARGS+=(--output-json "${usage_output_json}")
[[ -n "${usage_output_csv:-}" ]] && ARGS+=(--output-csv "${usage_output_csv}")
[[ -n "${usage_ttl:-}" ]] && ARGS+=(--ttl "${usage_ttl}")
[[ -n "${usage_max_cost_regression_pct:-}" ]] && ARGS+=(--max-cost-regression-pct "${usage_max_cost_regression_pct}")
[[ -n "${usage_min_cache_read_delta:-}" ]] && ARGS+=(--min-cache-read-delta "${usage_min_cache_read_delta}")
[[ "${usage_dry_run:-}" == "true" ]] && ARGS+=(--dry-run)

pnpm verify:cache "${ARGS[@]}"
"""

[tasks."verify:cache:agent"]
description = "Smoke-test that 1h caching engages on a subagent-shaped workload (covers the agent:* allowlist path). Uses permissive default thresholds because the tail policy's economics on short synthetic assistant responses do not match real subagent workloads; explicit flags override."
usage = '''
arg "[model]" help="Model ID (default: ANTHROPIC_MODEL env)"
flag "--output-json <file>" help="Write benchmark JSON report"
flag "--output-csv <file>" help="Write benchmark CSV report"
flag "--max-cost-regression-pct <pct>" help="Allowed patched cost regression percent (default 10)"
flag "--min-cache-read-delta <tokens>" help="Required patched cache_read delta tokens (default -1000000, effectively disabled)"
flag "--dry-run" help="Render benchmark plan without calling the API"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail

if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
  echo "Skipping verify:cache:agent (ANTHROPIC_API_KEY is not set)"
  exit 0
fi

ARGS=(--transcript src/verification/fixtures/cache-transcript-subagent.json --ttl 1h)
ARGS+=(--max-cost-regression-pct "${usage_max_cost_regression_pct:-10}")
ARGS+=(--min-cache-read-delta "${usage_min_cache_read_delta:--1000000}")
[[ -n "${usage_model:-}" ]] && ARGS+=(--model "${usage_model}")
[[ -n "${usage_output_json:-}" ]] && ARGS+=(--output-json "${usage_output_json}")
[[ -n "${usage_output_csv:-}" ]] && ARGS+=(--output-csv "${usage_output_csv}")
[[ "${usage_dry_run:-}" == "true" ]] && ARGS+=(--dry-run)

pnpm verify:cache "${ARGS[@]}"
"""

[tasks."prompts:export"]
description = "Extract prompt artifacts from promoted binary or clean version"
usage = 'arg "[source]" help="Version or current (default: current)"'
run = "npx tsx scripts/export-prompts-current.ts ${usage_source:-current}"


[tasks.clean]
description = "Remove output directories"
run = "rm -rf versions_clean"

[tasks.typecheck]
description = "Run TypeScript type checking"
run = "pnpm typecheck"

[tasks.lint]
description = "Lint source files"
run = "pnpm biome check src/"

[tasks.format]
description = "Format source files"
run = "pnpm biome format --write src/"

[tasks."verify:patches"]
description = "Verify patcher health and dry-run patch application for native target (cli.js optional)"
run = """
#!/usr/bin/env bash
set -euo pipefail

NATIVE_TARGET="${NATIVE_TARGET:-}"
CLI_TARGET="${CLI_TARGET:-}"
TMP_VERIFY_DIR="${TMP_VERIFY_DIR:-}"
OWN_TMP_VERIFY_DIR="false"
if [[ -z "$TMP_VERIFY_DIR" ]]; then
  TMP_VERIFY_DIR="$(mktemp -d "${TMPDIR:-/tmp}/cc-verify-patches.XXXXXX")"
  OWN_TMP_VERIFY_DIR="true"
else
  mkdir -p "$TMP_VERIFY_DIR"
fi

CLI_SUMMARY="${CLI_SUMMARY:-$TMP_VERIFY_DIR/cc-cli-dryrun-summary.json}"
NATIVE_SUMMARY="${NATIVE_SUMMARY:-$TMP_VERIFY_DIR/cc-native-dryrun-summary.json}"
CLI_PATCHED_FOR_ANCHORS="${CLI_PATCHED_FOR_ANCHORS:-$TMP_VERIFY_DIR/cc-cli-patched-for-anchors.js}"
NATIVE_PATCHED_FOR_PROMPTS="${NATIVE_PATCHED_FOR_PROMPTS:-$TMP_VERIFY_DIR/cc-native-patched}"
NATIVE_PATCHED_JS_DIR="${NATIVE_PATCHED_JS_DIR:-$TMP_VERIFY_DIR/native-prompt-export}"
NATIVE_PATCHED_JS="${NATIVE_PATCHED_JS:-$NATIVE_PATCHED_JS_DIR/cli.js}"
NATIVE_PROMPT_EXPORT_LABEL="$(basename "$NATIVE_PATCHED_JS_DIR")"
NATIVE_PROMPT_EXPORT_DIR="${NATIVE_PROMPT_EXPORT_DIR:-$(pwd)/exported-prompts/$NATIVE_PROMPT_EXPORT_LABEL}"

if [[ "$OWN_TMP_VERIFY_DIR" == "true" ]]; then
  trap 'rm -rf "$TMP_VERIFY_DIR" "$NATIVE_PROMPT_EXPORT_DIR"' EXIT
fi

rm -rf "$NATIVE_PATCHED_JS_DIR" "$NATIVE_PROMPT_EXPORT_DIR"
mkdir -p "$NATIVE_PATCHED_JS_DIR"

assert_clean_summary() {
  local summary_path="$1"
  local label="$2"

  if ! jq -e '.result and (.result.failedTags | type == "array") and (.result.appliedTags | type == "array")' "$summary_path" >/dev/null; then
    echo "Invalid dry-run summary schema for ${label}: $summary_path" >&2
    return 1
  fi

  if ! jq -e '.error == null' "$summary_path" >/dev/null; then
    echo "Dry-run summary reports top-level error for ${label}: $summary_path" >&2
    jq -r '.error' "$summary_path" >&2
    return 1
  fi

  if ! jq -e '.result.failedTags | length == 0' "$summary_path" >/dev/null; then
    echo "Dry-run summary contains failed tags for ${label}: $summary_path" >&2
    jq -r '.result.verifications[] | select(.passed == false) | "  - " + .tag + ": " + (.reason // "unknown")' "$summary_path" >&2
    return 1
  fi
}

pnpm typecheck
pnpm biome check src/index.ts src/manager.ts src/patch-runner.ts src/patches/index.ts src/patches/edit-extended.ts src/templates/edit_hook.js

if [[ -n "$CLI_TARGET" && -f "$CLI_TARGET" ]]; then
  pnpm cli --target "$CLI_TARGET" --dry-run --summary-path "$CLI_SUMMARY"
  assert_clean_summary "$CLI_SUMMARY" "cli.js"
else
  echo "Skipping cli.js dry-run (set CLI_TARGET to enable)"
fi

# Auto-detect native target from promoted binary if not set
if [[ -z "$NATIVE_TARGET" ]]; then
  CURRENT_LINK="$HOME/.local/share/claude/versions/current"
  if [[ -L "$CURRENT_LINK" ]]; then
    PROMOTED_BIN="$(readlink -f "$CURRENT_LINK" 2>/dev/null || true)"
    if [[ -n "$PROMOTED_BIN" && -f "$PROMOTED_BIN" ]]; then
      # Walk up from builds/<ts>-claude to <platform>/claude (source binary)
      BUILDS_DIR="$(dirname "$PROMOTED_BIN")"
      if [[ "$(basename "$BUILDS_DIR")" == "builds" ]]; then
        PLATFORM_DIR="$(dirname "$BUILDS_DIR")"
        SOURCE_BIN="$PLATFORM_DIR/claude"
        [[ -f "$SOURCE_BIN" ]] && NATIVE_TARGET="$SOURCE_BIN"
      fi
    fi
  fi
fi

if [[ -n "$NATIVE_TARGET" && -f "$NATIVE_TARGET" ]]; then
  pnpm cli --target "$NATIVE_TARGET" --dry-run --summary-path "$NATIVE_SUMMARY"
  assert_clean_summary "$NATIVE_SUMMARY" "native"
  pnpm cli --target "$NATIVE_TARGET" --output "$NATIVE_PATCHED_FOR_PROMPTS"
  pnpm cli --target "$NATIVE_PATCHED_FOR_PROMPTS" --unpack "$NATIVE_PATCHED_JS"
  npx tsx scripts/export-prompts.ts "$NATIVE_PATCHED_JS"
  pnpm verify:prompt-surfaces "$NATIVE_PROMPT_EXPORT_DIR"
else
  echo "Skipping native dry-run (no NATIVE_TARGET and no promoted binary found)"
fi

if [[ -n "$CLI_TARGET" && -f "$CLI_TARGET" ]]; then
  cp "$CLI_TARGET" "$CLI_PATCHED_FOR_ANCHORS"
  pnpm cli --target "$CLI_PATCHED_FOR_ANCHORS"
  pnpm verify:anchors "$CLI_PATCHED_FOR_ANCHORS" "$CLI_TARGET"
else
  echo "Skipping anchor checks (set CLI_TARGET to enable)"
fi
"""
