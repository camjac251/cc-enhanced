# Lefthook git hooks configuration
# https://github.com/evilmartians/lefthook
#
# Auto-installed via mise enter hook (see mise.toml [hooks]).
# Skip all:    LEFTHOOK=0 git commit ...   (or --no-verify)
# Run manual:  lefthook run pre-commit

min_version: 1.11.0

assert_lefthook_installed: true

pre-commit:
  parallel: false
  commands:
    format:
      glob: "{src/**/*.{ts,js,mjs,json},scripts/**/*.{ts,js,mjs},biome.json}"
      run: pnpm biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      priority: 1
    lint:
      glob: "{src/**/*.{ts,js,mjs,json},scripts/**/*.{ts,js,mjs},biome.json}"
      run: pnpm biome check --no-errors-on-unmatched {staged_files}
      priority: 2
    typecheck:
      glob: "{src/**/*.ts,tsconfig.json,package.json}"
      run: pnpm typecheck
      priority: 3

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(sed -n '1p' {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?(!)?: .+'; then
          echo "Bad commit message: $msg" >&2
          echo "" >&2
          echo "Format:  type(scope): description" >&2
          echo "Types:   feat fix docs style refactor perf test build ci chore revert" >&2
          echo "Example: fix(mise): drop trailing head pipe from native:pull" >&2
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    test:
      run: pnpm test
      priority: 1
