[tools]
node = "24"
pnpm = "10"

[tasks.patch]
description = "Download and patch latest version"
run = "pnpm cli"

[tasks."patch:version"]
description = "Download and patch specific version"
usage = '''
arg "<version>" help="Version to patch (e.g. 2.0.75)"
arg "[args]" var=#true help="Extra args passed to CLI"
'''
run = "pnpm cli -v ${usage_version?} ${usage_args:-}"

[tasks.diff]
description = "Compare original vs patched version"
usage = 'arg "<version>" help="Version to compare"'
run = """
#!/usr/bin/env bash
set -e
pnpm cli -v "${usage_version?}" --out-dir versions_clean --no-patch --skip-format
pnpm diff diff "versions_clean/${usage_version?}/package/cli.js" "versions/${usage_version?}/package/cli.js"
"""

[tasks.inspect]
description = "Search AST in patched file"
usage = '''
arg "<version>" help="Version to inspect"
arg "<query>" help="Search term"
'''
run = 'pnpm inspect search "versions/${usage_version?}/package/cli.js" "${usage_query?}"'

[tasks.verify]
description = "Verify patches applied correctly"
usage = 'arg "<version>" help="Version to verify"'
run = "pnpm verify ${usage_version?}"

[tasks.clean]
description = "Remove output directories"
run = "rm -rf versions versions_clean"

[tasks.typecheck]
description = "Run TypeScript type checking"
run = "pnpm typecheck"
